document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"28c13bca-ce98-4de2-8e89-316b55a1c172\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6e12bbf8-289a-4d01-b9f0-8494f336ea45\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"4112ef86-29e1-4308-b5d8-e4b4144a60b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Explicit @font-face fallbacks (variable font, full weight range) so\n   the typeface is declared in the style closure even if the remote\n   @import is not followed. */\n@font-face {\n  font-family: \"Plus Jakarta Sans\";\n  font-style: normal;\n  font-weight: 400 900;\n  font-display: swap;\n  src: url(\"https://fonts.gstatic.com/s/plusjakartasans/v12/LDIbaomQNQcsA88c7O9yZ4KMCoOg4Ko20yw4kV2qxMrLpRu.woff2\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"Plus Jakarta Sans\";\n  font-style: italic;\n  font-weight: 400 700;\n  font-display: swap;\n  src: url(\"https://fonts.gstatic.com/s/plusjakartasans/v12/LDIoaomQNQcsA88c7O9yZ4KMCoOg4Lw2tdyDfdRkn0xtfXlLeFnGw.woff2\") format(\"woff2\");\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   COLORS — AlliedRx Institute of Healthcare\n   The brand spans an indigo→violet spectrum. Indigo (#585bfc) is\n   the primary action color; violet (#7c3aed) is the secondary\n   \"education\" tone. Deep navy anchors hero / dark sections, and a\n   signature pastel gradient (violet→pink→sky) is used for accent\n   text. Neutrals are cool slates. Semantics follow standard\n   clinical conventions (green clear / red flag / amber caution).\n   ============================================================ */\n:root {\n  /* ---- Brand: Indigo (primary action) ---- */\n  --indigo-50:  #f0f1ff;\n  --indigo-100: #e8e4fb;\n  --indigo-200: #d4d5fe;\n  --indigo-300: #9496fd;\n  --indigo-400: #6d6ffb;\n  --indigo-500: #585bfc;   /* primary brand */\n  --indigo-600: #4346d4;\n  --indigo-700: #3730a3;\n  --indigo-800: #1e1060;\n\n  /* ---- Brand: Violet (education / secondary) ---- */\n  --violet-50:  #f5f3ff;\n  --violet-100: #ede9fe;   /* purple-pale */\n  --violet-200: #d8d0f7;\n  --violet-300: #c084fc;\n  --violet-400: #a78bfa;   /* purple-light, gradient anchor */\n  --violet-500: #7c3aed;   /* violet brand */\n  --violet-600: #6d28d9;\n  --violet-700: #5b21b6;\n\n  /* ---- Accent gradient stops ---- */\n  --accent-sky:  #60a5fa;\n  --accent-pink: #f0abfc;\n  --accent-lime: #a3e635;  /* \"campus\" / live dot only */\n\n  /* ---- Navy (dark surfaces, heroes) ---- */\n  --navy-900: #0b0b2c;\n  --navy-850: #0d0629;\n  --navy-800: #0f0a2e;\n  --navy-700: #1a1144;\n  --navy-600: #1a0f40;\n  --navy-500: #2d1580;\n\n  /* ---- Neutrals (cool slate) ---- */\n  --ink:        #0f172a;   /* primary text */\n  --ink-violet: #1e1b4b;   /* text on violet-pale grounds */\n  --slate-700:  #334155;\n  --slate-600:  #475569;\n  --slate-500:  #64748b;   /* muted body */\n  --slate-400:  #94a3b8;   /* faint / placeholder */\n  --slate-300:  #cbd5e1;\n  --border:     #e2e0f0;   /* default hairline */\n  --border-cool:#e5e7eb;\n  --surface:    #ffffff;\n  --surface-50: #faf9ff;   /* page tint */\n  --surface-violet: #f8f6ff;\n  --surface-app: #f5f7ff;  /* admin app canvas */\n\n  /* ---- Semantic ---- */\n  --success:    #059669;\n  --success-alt:#12b76a;\n  --success-bg: #ecfdf5;\n  --success-bd: #a7f3d0;\n  --danger:     #f04438;\n  --danger-bg:  #fee2e2;\n  --danger-fg:  #b91c1c;\n  --warning:    #f79009;\n  --warning-bg: #fef9c3;\n  --warning-fg: #92400e;\n  --info:       #1d4ed8;\n  --info-bg:    #dbeafe;\n\n  /* ---- Signature gradients ---- */\n  --gradient-accent: linear-gradient(135deg, #a78bfa, #f0abfc, #60a5fa); /* @kind color */\n  --gradient-cta:    linear-gradient(135deg, #585bfc, #4346d4);          /* @kind color */\n  --gradient-violet: linear-gradient(135deg, #7c6cdb 0%, #5b4ccc 50%, #9b8ce8 100%); /* @kind color */\n  --gradient-hero:   linear-gradient(135deg, #0d0b2e 0%, #1e1060 50%, #2d1580 100%); /* @kind color */\n\n  /* ============ Semantic aliases ============ */\n  --brand:          var(--indigo-500);\n  --brand-strong:   var(--indigo-600);\n  --brand-soft:     var(--indigo-50);\n  --brand-edu:      var(--violet-500);\n\n  --text-primary:   var(--ink);\n  --text-secondary: var(--slate-600);\n  --text-muted:     var(--slate-500);\n  --text-faint:     var(--slate-400);\n  --text-inverse:   #ffffff;\n  --text-brand:     var(--indigo-500);\n\n  --surface-page:   var(--surface);\n  --surface-tint:   var(--surface-50);\n  --surface-card:   var(--surface);\n  --surface-subtle: var(--violet-50);\n  --surface-dark:   var(--navy-850);\n\n  --border-subtle:  var(--border);\n  --border-strong:  var(--indigo-200);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   TYPOGRAPHY — AlliedRx\n   One typeface: Plus Jakarta Sans. AlliedRx leans heavy: display\n   headlines are 800–900 weight with tight negative tracking; body\n   is 400–500 with generous 1.6–1.8 line-height; overlines are tiny\n   700 uppercase with wide tracking. Mono is reserved for codes/IDs.\n   ============================================================ */\n:root {\n  --font-sans: \"Plus Jakarta Sans\", \"Inter\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-mono: ui-monospace, Menlo, Consolas, \"Liberation Mono\", monospace; /* IDs & codes only */\n\n  /* ---- Weights ---- */\n  --fw-regular:  400;  /* @kind font */\n  --fw-medium:   500;  /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold:     700;  /* @kind font */\n  --fw-extra:    800;  /* @kind font */\n  --fw-black:    900;  /* @kind font */\n\n  /* ---- Type scale (px) ---- */\n  --fs-overline: 11px;   /* eyebrow / kicker */\n  --fs-caption:  12px;\n  --fs-small:    13px;\n  --fs-body:     15px;\n  --fs-body-lg:  17px;\n  --fs-h5:       20px;\n  --fs-h4:       24px;\n  --fs-h3:       28px;\n  --fs-h2:       34px;\n  --fs-h1:       44px;\n  --fs-display:  56px;\n  --fs-mega:     72px;\n\n  /* ---- Fluid display sizes (hero) ---- */\n  --fs-display-fluid: clamp(36px, 5vw, 66px);  /* @kind font */\n  --fs-h1-fluid:      clamp(28px, 3.2vw, 44px); /* @kind font */\n  --fs-h2-fluid:      clamp(28px, 4vw, 42px);  /* @kind font */\n\n  /* ---- Line heights ---- */\n  --lh-tight:   1.05;   /* @kind font */\n  --lh-snug:    1.2;    /* @kind font */\n  --lh-normal:  1.5;    /* @kind font */\n  --lh-relaxed: 1.7;    /* @kind font */\n  --lh-loose:   1.85;   /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --ls-display:  -0.03em;  /* big headlines @kind font */\n  --ls-tight:    -0.01em;  /* @kind font */\n  --ls-normal:   0;        /* @kind font */\n  --ls-overline: 0.12em;   /* eyebrows @kind font */\n  --ls-wide:     0.18em;   /* hero kickers @kind font */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SPACING & LAYOUT — AlliedRx\n   4px base unit. Sections breathe: 88px desktop vertical rhythm,\n   content capped at ~1140–1300px. Page gutters 40–80px.\n   ============================================================ */\n:root {\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-14:  56px;\n  --space-18:  72px;\n  --space-22:  88px;\n  --space-25:  100px;\n\n  /* ---- Section rhythm ---- */\n  --section-y:       88px;\n  --section-y-tight: 56px;\n  --gutter:          40px;\n  --gutter-wide:     80px;\n\n  /* ---- Content widths ---- */\n  --content-narrow: 640px;\n  --content:        1140px;\n  --content-wide:   1300px;\n\n  /* ---- Common component sizes ---- */\n  --sidebar-w:    240px;\n  --control-h:    44px;   /* min tap target */\n  --control-h-sm: 36px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   EFFECTS — radii, shadows, blur, motion — AlliedRx\n   Rounded everything: pills (100px) for CTAs, 12–20px for cards.\n   Shadows are tinted with the brand indigo, never neutral black on\n   light surfaces. Glass panels use heavy blur over dark grounds.\n   Motion is quick and gentle: 0.15–0.25s ease, subtle -2/-4px lifts.\n   ============================================================ */\n:root {\n  /* ---- Radii ---- */\n  --radius-xs:   6px;\n  --radius-sm:   8px;\n  --radius-md:   10px;\n  --radius-lg:   12px;\n  --radius-xl:   16px;\n  --radius-2xl:  20px;\n  --radius-pill: 100px;\n  --radius-full: 9999px;\n\n  /* ---- Shadows (brand-tinted) ---- */\n  --shadow-xs:    0 1px 2px rgba(15, 23, 42, 0.05);\n  --shadow-sm:    0 2px 8px rgba(15, 23, 42, 0.06);\n  --shadow-card:  0 2px 10px rgba(15, 23, 42, 0.07);\n  --shadow-md:    0 8px 24px rgba(13, 6, 41, 0.12);\n  --shadow-lift:  0 16px 44px rgba(91, 76, 204, 0.14);\n  --shadow-cta:   0 8px 32px rgba(88, 91, 252, 0.30);\n  --shadow-glass: 0 12px 48px rgba(0, 0, 0, 0.50), inset 0 1px 0 rgba(255, 255, 255, 0.06);\n  --shadow-modal: 0 20px 60px rgba(13, 6, 41, 0.35);\n\n  /* ---- Glass ---- */\n  --blur-card:  blur(16px);  /* @kind other */\n  --blur-panel: blur(28px);  /* @kind other */\n  --glass-light: rgba(255, 255, 255, 0.92);  /* @kind color */\n  --glass-dark:  rgba(8, 6, 32, 0.82);        /* @kind color */\n\n  /* ---- Borders ---- */\n  --border-width: 1px;          /* @kind spacing */\n  --border-width-strong: 1.5px; /* @kind spacing */\n\n  /* ---- Motion ---- */\n  --ease:       cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --dur-fast:   0.15s;  /* @kind other */\n  --dur:        0.2s;   /* @kind other */\n  --dur-slow:   0.25s;  /* @kind other */\n  --lift:       translateY(-2px);  /* @kind other */\n  --lift-lg:    translateY(-4px);  /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   AlliedRx Institute of Healthcare — Design System\n   Global entry point. Consumers link THIS file only.\n   Keep this file as a list of @imports — no rules inline.\n   ============================================================ */\n/* ============================================================\n   Fonts — Plus Jakarta Sans is the single AlliedRx typeface.\n   This is the genuine brand font (a Google Font, no substitution).\n   Loaded from the Google Fonts CDN; @font-face rules below declare\n   the webfonts to the compiler and ship to consumers.\n   ============================================================ */\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"cb867f55-587a-4534-a71e-493396b3b0cf\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"21fa05a5-6878-48e7-8990-180819a9ac4d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\ ns';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4112ef86-29e1-4308-b5d8-e4b4144a60b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9e5243b2-2708-432a-a038-66c16aab4666\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"28c13bca-ce98-4de2-8e89-316b55a1c172\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6e12bbf8-289a-4d01-b9f0-8494f336ea45\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"4112ef86-29e1-4308-b5d8-e4b4144a60b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Explicit @font-face fallbacks (variable font, full weight range) so\n   the typeface is declared in the style closure even if the remote\n   @import is not followed. */\n@font-face {\n  font-family: \"Plus Jakarta Sans\";\n  font-style: normal;\n  font-weight: 400 900;\n  font-display: swap;\n  src: url(\"https://fonts.gstatic.com/s/plusjakartasans/v12/LDIbaomQNQcsA88c7O9yZ4KMCoOg4Ko20yw4kV2qxMrLpRu.woff2\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"Plus Jakarta Sans\";\n  font-style: italic;\n  font-weight: 400 700;\n  font-display: swap;\n  src: url(\"https://fonts.gstatic.com/s/plusjakartasans/v12/LDIoaomQNQcsA88c7O9yZ4KMCoOg4Lw2tdyDfdRkn0xtfXlLeFnGw.woff2\") format(\"woff2\");\n}\n\n/* ============================================================\n   COLORS — AlliedRx Institute of Healthcare\n   The brand spans an indigo→violet spectrum. Indigo (#585bfc) is\n   the primary action color; violet (#7c3aed) is the secondary\n   \"education\" tone. Deep navy anchors hero / dark sections, and a\n   signature pastel gradient (violet→pink→sky) is used for accent\n   text. Neutrals are cool slates. Semantics follow standard\n   clinical conventions (green clear / red flag / amber caution).\n   ============================================================ */\n:root {\n  /* ---- Brand: Indigo (primary action) ---- */\n  --indigo-50:  #f0f1ff;\n  --indigo-100: #e8e4fb;\n  --indigo-200: #d4d5fe;\n  --indigo-300: #9496fd;\n  --indigo-400: #6d6ffb;\n  --indigo-500: #585bfc;   /* primary brand */\n  --indigo-600: #4346d4;\n  --indigo-700: #3730a3;\n  --indigo-800: #1e1060;\n\n  /* ---- Brand: Violet (education / secondary) ---- */\n  --violet-50:  #f5f3ff;\n  --violet-100: #ede9fe;   /* purple-pale */\n  --violet-200: #d8d0f7;\n  --violet-300: #c084fc;\n  --violet-400: #a78bfa;   /* purple-light, gradient anchor */\n  --violet-500: #7c3aed;   /* violet brand */\n  --violet-600: #6d28d9;\n  --violet-700: #5b21b6;\n\n  /* ---- Accent gradient stops ---- */\n  --accent-sky:  #60a5fa;\n  --accent-pink: #f0abfc;\n  --accent-lime: #a3e635;  /* \"campus\" / live dot only */\n\n  /* ---- Navy (dark surfaces, heroes) ---- */\n  --navy-900: #0b0b2c;\n  --navy-850: #0d0629;\n  --navy-800: #0f0a2e;\n  --navy-700: #1a1144;\n  --navy-600: #1a0f40;\n  --navy-500: #2d1580;\n\n  /* ---- Neutrals (cool slate) ---- */\n  --ink:        #0f172a;   /* primary text */\n  --ink-violet: #1e1b4b;   /* text on violet-pale grounds */\n  --slate-700:  #334155;\n  --slate-600:  #475569;\n  --slate-500:  #64748b;   /* muted body */\n  --slate-400:  #94a3b8;   /* faint / placeholder */\n  --slate-300:  #cbd5e1;\n  --border:     #e2e0f0;   /* default hairline */\n  --border-cool:#e5e7eb;\n  --surface:    #ffffff;\n  --surface-50: #faf9ff;   /* page tint */\n  --surface-violet: #f8f6ff;\n  --surface-app: #f5f7ff;  /* admin app canvas */\n\n  /* ---- Semantic ---- */\n  --success:    #059669;\n  --success-alt:#12b76a;\n  --success-bg: #ecfdf5;\n  --success-bd: #a7f3d0;\n  --danger:     #f04438;\n  --danger-bg:  #fee2e2;\n  --danger-fg:  #b91c1c;\n  --warning:    #f79009;\n  --warning-bg: #fef9c3;\n  --warning-fg: #92400e;\n  --info:       #1d4ed8;\n  --info-bg:    #dbeafe;\n\n  /* ---- Signature gradients ---- */\n  --gradient-accent: linear-gradient(135deg, #a78bfa, #f0abfc, #60a5fa); /* @kind color */\n  --gradient-cta:    linear-gradient(135deg, #585bfc, #4346d4);          /* @kind color */\n  --gradient-violet: linear-gradient(135deg, #7c6cdb 0%, #5b4ccc 50%, #9b8ce8 100%); /* @kind color */\n  --gradient-hero:   linear-gradient(135deg, #0d0b2e 0%, #1e1060 50%, #2d1580 100%); /* @kind color */\n\n  /* ============ Semantic aliases ============ */\n  --brand:          var(--indigo-500);\n  --brand-strong:   var(--indigo-600);\n  --brand-soft:     var(--indigo-50);\n  --brand-edu:      var(--violet-500);\n\n  --text-primary:   var(--ink);\n  --text-secondary: var(--slate-600);\n  --text-muted:     var(--slate-500);\n  --text-faint:     var(--slate-400);\n  --text-inverse:   #ffffff;\n  --text-brand:     var(--indigo-500);\n\n  --surface-page:   var(--surface);\n  --surface-tint:   var(--surface-50);\n  --surface-card:   var(--surface);\n  --surface-subtle: var(--violet-50);\n  --surface-dark:   var(--navy-850);\n\n  --border-subtle:  var(--border);\n  --border-strong:  var(--indigo-200);\n}\n\n/* ============================================================\n   TYPOGRAPHY — AlliedRx\n   One typeface: Plus Jakarta Sans. AlliedRx leans heavy: display\n   headlines are 800–900 weight with tight negative tracking; body\n   is 400–500 with generous 1.6–1.8 line-height; overlines are tiny\n   700 uppercase with wide tracking. Mono is reserved for codes/IDs.\n   ============================================================ */\n:root {\n  --font-sans: \"Plus Jakarta Sans\", \"Inter\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-mono: ui-monospace, Menlo, Consolas, \"Liberation Mono\", monospace; /* IDs & codes only */\n\n  /* ---- Weights ---- */\n  --fw-regular:  400;  /* @kind font */\n  --fw-medium:   500;  /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold:     700;  /* @kind font */\n  --fw-extra:    800;  /* @kind font */\n  --fw-black:    900;  /* @kind font */\n\n  /* ---- Type scale (px) ---- */\n  --fs-overline: 11px;   /* eyebrow / kicker */\n  --fs-caption:  12px;\n  --fs-small:    13px;\n  --fs-body:     15px;\n  --fs-body-lg:  17px;\n  --fs-h5:       20px;\n  --fs-h4:       24px;\n  --fs-h3:       28px;\n  --fs-h2:       34px;\n  --fs-h1:       44px;\n  --fs-display:  56px;\n  --fs-mega:     72px;\n\n  /* ---- Fluid display sizes (hero) ---- */\n  --fs-display-fluid: clamp(36px, 5vw, 66px);  /* @kind font */\n  --fs-h1-fluid:      clamp(28px, 3.2vw, 44px); /* @kind font */\n  --fs-h2-fluid:      clamp(28px, 4vw, 42px);  /* @kind font */\n\n  /* ---- Line heights ---- */\n  --lh-tight:   1.05;   /* @kind font */\n  --lh-snug:    1.2;    /* @kind font */\n  --lh-normal:  1.5;    /* @kind font */\n  --lh-relaxed: 1.7;    /* @kind font */\n  --lh-loose:   1.85;   /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --ls-display:  -0.03em;  /* big headlines @kind font */\n  --ls-tight:    -0.01em;  /* @kind font */\n  --ls-normal:   0;        /* @kind font */\n  --ls-overline: 0.12em;   /* eyebrows @kind font */\n  --ls-wide:     0.18em;   /* hero kickers @kind font */\n}\n\n/* ============================================================\n   SPACING & LAYOUT — AlliedRx\n   4px base unit. Sections breathe: 88px desktop vertical rhythm,\n   content capped at ~1140–1300px. Page gutters 40–80px.\n   ============================================================ */\n:root {\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-14:  56px;\n  --space-18:  72px;\n  --space-22:  88px;\n  --space-25:  100px;\n\n  /* ---- Section rhythm ---- */\n  --section-y:       88px;\n  --section-y-tight: 56px;\n  --gutter:          40px;\n  --gutter-wide:     80px;\n\n  /* ---- Content widths ---- */\n  --content-narrow: 640px;\n  --content:        1140px;\n  --content-wide:   1300px;\n\n  /* ---- Common component sizes ---- */\n  --sidebar-w:    240px;\n  --control-h:    44px;   /* min tap target */\n  --control-h-sm: 36px;\n}\n\n/* ============================================================\n   EFFECTS — radii, shadows, blur, motion — AlliedRx\n   Rounded everything: pills (100px) for CTAs, 12–20px for cards.\n   Shadows are tinted with the brand indigo, never neutral black on\n   light surfaces. Glass panels use heavy blur over dark grounds.\n   Motion is quick and gentle: 0.15–0.25s ease, subtle -2/-4px lifts.\n   ============================================================ */\n:root {\n  /* ---- Radii ---- */\n  --radius-xs:   6px;\n  --radius-sm:   8px;\n  --radius-md:   10px;\n  --radius-lg:   12px;\n  --radius-xl:   16px;\n  --radius-2xl:  20px;\n  --radius-pill: 100px;\n  --radius-full: 9999px;\n\n  /* ---- Shadows (brand-tinted) ---- */\n  --shadow-xs:    0 1px 2px rgba(15, 23, 42, 0.05);\n  --shadow-sm:    0 2px 8px rgba(15, 23, 42, 0.06);\n  --shadow-card:  0 2px 10px rgba(15, 23, 42, 0.07);\n  --shadow-md:    0 8px 24px rgba(13, 6, 41, 0.12);\n  --shadow-lift:  0 16px 44px rgba(91, 76, 204, 0.14);\n  --shadow-cta:   0 8px 32px rgba(88, 91, 252, 0.30);\n  --shadow-glass: 0 12px 48px rgba(0, 0, 0, 0.50), inset 0 1px 0 rgba(255, 255, 255, 0.06);\n  --shadow-modal: 0 20px 60px rgba(13, 6, 41, 0.35);\n\n  /* ---- Glass ---- */\n  --blur-card:  blur(16px);  /* @kind other */\n  --blur-panel: blur(28px);  /* @kind other */\n  --glass-light: rgba(255, 255, 255, 0.92);  /* @kind color */\n  --glass-dark:  rgba(8, 6, 32, 0.82);        /* @kind color */\n\n  /* ---- Borders ---- */\n  --border-width: 1px;          /* @kind spacing */\n  --border-width-strong: 1.5px; /* @kind spacing */\n\n  /* ---- Motion ---- */\n  --ease:       cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --dur-fast:   0.15s;  /* @kind other */\n  --dur:        0.2s;   /* @kind other */\n  --dur-slow:   0.25s;  /* @kind other */\n  --lift:       translateY(-2px);  /* @kind other */\n  --lift-lg:    translateY(-4px);  /* @kind other */\n}\n\n<\u002Fstyle>\n  <script src=\"947d8bdc-61fd-47eb-bbe7-47fcc185e09d\"><\u002Fscript>\n  <script src=\"a3a2c04c-b618-4cda-a363-1cbb3c603969\"><\u002Fscript>\n  <style>\n    * { box-sizing: border-box; }\n    html { scroll-behavior: smooth; scroll-padding-top: 124px; }\n    body { margin: 0; }\n    a { color: inherit; }\n    @keyframes heroFloat { 0% { transform: translateY(20px) rotate(0deg); opacity: 0; } 14% { opacity: var(--pk,0.2); } 86% { opacity: var(--pk,0.2); } 100% { transform: translateY(-540px) rotate(var(--r1,6deg)); opacity: 0; } }\n    @keyframes heroTwinkle { 0%,100% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1); opacity: var(--pk,0.45); } }\n\n    /* ---------- RESPONSIVE: tablet ---------- */\n    @media (max-width: 920px) {\n      /* collapse the major two-column page layouts + 3-up grids */\n      [style*=\"grid-template-columns:1.05fr 0.95fr\"],\n      [style*=\"grid-template-columns:0.95fr 1.05fr\"],\n      [style*=\"grid-template-columns:0.8fr 1.2fr\"],\n      [style*=\"grid-template-columns:0.7fr 1.3fr\"],\n      [style*=\"grid-template-columns:1.2fr 0.8fr\"],\n      [style*=\"grid-template-columns:1.04fr 0.96fr\"],\n      [style*=\"grid-template-columns:repeat(3,1fr)\"],\n      [style*=\"grid-template-columns:auto 1fr auto\"] {\n        grid-template-columns: 1fr !important;\n      }\n      /* externship: stack icon/text/button and left-align the CTA */\n      [style*=\"grid-template-columns:auto 1fr auto\"] { gap: 18px !important; justify-items: start !important; }\n      /* image column should lead on overview when stacked */\n      section[id=\"overview\"] [style*=\"grid-template-columns:0.8fr 1.2fr\"] { gap: 32px !important; }\n    }\n\n    /* ---------- RESPONSIVE: phone ---------- */\n    @media (max-width: 600px) {\n      /* collapse every remaining grid (inner 2-up lists, module lists, etc.) */\n      [style*=\"grid-template-columns\"] { grid-template-columns: 1fr !important; }\n      /* tighten section rhythm + gutters */\n      section[id] { padding-top: 52px !important; padding-bottom: 52px !important; padding-left: 18px !important; padding-right: 18px !important; }\n      [style*=\"padding:0 28px\"] { padding-left: 18px !important; padding-right: 18px !important; }\n      /* shrink oversized inner panel padding */\n      [style*=\"padding:48px 44px\"] { padding: 30px 22px !important; }\n      [style*=\"padding:60px 28px\"] { padding: 44px 22px !important; }\n      [style*=\"padding:38px 36px\"] { padding: 28px 22px !important; }\n      [style*=\"padding:34px 38px\"] { padding: 26px 22px !important; }\n      [style*=\"padding:32px 36px\"] { padding: 26px 22px !important; }\n      [style*=\"padding:26px 32px\"] { padding: 22px 20px !important; }\n      [style*=\"padding:28px 30px\"] { padding: 22px 22px

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlliedRx – Get Board Certified</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{max-width:100%;overflow-x:hidden;}
html,body{width:100%;max-width:100%;overflow-x:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#080d1a;color:#fff;}
.hero{position:relative;overflow:hidden;padding:0 60px;background:linear-gradient(135deg,#080d1a 0%,#0f0a2e 50%,#130830 100%);}
.hero::before{content:'';position:absolute;top:-200px;right:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(124,58,237,0.18) 0%,transparent 70%);pointer-events:none;}
.hero::after{content:'';position:absolute;bottom:-150px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(93,109,250,0.12) 0%,transparent 70%);pointer-events:none;}
.hero-inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:1fr auto auto;gap:0;align-items:end;position:relative;z-index:1;}
.hero-copy{padding:72px 40px 48px 0;align-self:center;min-width:0;}
.hero-right{width:340px;flex-shrink:0;position:relative;display:flex;align-items:flex-end;justify-content:center;}
.hero-photo{width:100%;height:700px;border-radius:22px 22px 0 0;overflow:hidden;box-shadow:0 28px 72px rgba(0,0,0,0.6);}
.hero-photo img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.hero-card{width:320px;flex-shrink:0;background:#fff;border:1px solid #e8e4fb;border-radius:20px 20px 0 0;padding:24px 20px 20px;align-self:flex-end;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(145,72,252,0.15);border:1px solid rgba(145,72,252,0.3);color:#c4b5fd;font-size:11px;font-weight:700;padding:6px 14px;border-radius:100px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;}
.eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:#9148fc;display:block;}
h1{font-size:48px;font-weight:900;line-height:1.08;color:#fff;margin-bottom:20px;}
h1 em{font-style:normal;background:linear-gradient(135deg,#c4b5fd,#9148fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-tagline{font-size:20px;font-weight:800;margin-bottom:14px;line-height:1.4;}
.hero-desc{font-size:15px;color:#e2e8f0;line-height:1.8;margin-bottom:32px;}
.hero-ctas{display:flex;gap:12px;align-items:center;margin-bottom:40px;flex-wrap:wrap;}
.cta-primary{background:linear-gradient(135deg,#7c3aed,#9148fc);color:#fff;padding:14px 32px;border-radius:100px;font-size:15px;font-weight:700;text-decoration:none;box-shadow:0 8px 32px rgba(145,72,252,0.45);white-space:nowrap;}
.cta-secondary{background:#fff;color:#7c3aed;font-size:15px;font-weight:700;text-decoration:none;padding:14px 32px;border-radius:100px;display:inline-flex;align-items:center;gap:6px;border:2px solid #fff;white-space:nowrap;}
.cta-secondary::after{content:'→';}
.hero-stats{display:flex;gap:24px;flex-wrap:wrap;}
.stat{border-left:2px solid rgba(145,72,252,0.4);padding-left:14px;}
.stat-n{font-size:22px;font-weight:900;color:#c4b5fd;line-height:1;}
.stat-l{font-size:10px;color:#fff;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}
.hc-head{font-size:13px;font-weight:700;background:linear-gradient(135deg,#c4b5fd,#9148fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.program-list{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
